<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowGuide AI Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =============================
       STEP 1: Walk through structure first
  ============================== -->

  <nav>
    <h2>GlowGuide</h2>
    <span>AI Beauty Assistant</span>
  </nav>

  <section class="hero">
    <h1>Your Personalized Beauty Recommendation Engine</h1>
    <p>
      Ask a skincare or beauty question and receive tailored
      recommendations powered by AI.
    </p>

    <!-- =============================
         STEP 2: AI Interaction UI
    ============================== -->

    <div class="ai-card">
      <input
        type="text"
        id="userInput"
        placeholder="What skincare routine is best for dry skin?"
      />
      <button id="askBtn">Ask GlowGuide</button>
      <div id="response">AI response will appear here...</div>
    </div>
  </section>

  <footer>
    © 2026 GlowGuide Demo. Educational Use Only.
  </footer>

  <script src="script.js"></script>
</body>
</html>
